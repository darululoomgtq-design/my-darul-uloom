<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Home</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .logout {
            background: red;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Student Dashboard</h2>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="container">

        <div class="card">
            <h3>👤 Student Name</h3>
            <p id="name">Rahul Sharma</p>
        </div>

        <div class="card">
            <h3>📅 Attendance</h3>
            <p id="attendance">Present</p>
        </div>

        <div class="card">
            <h3>📢 Announcements</h3>
            <ul id="announcement">
                <li>Exam on Monday</li>
                <li>Bring your ID card</li>
            </ul>
        </div>

    </div>

    <script>
        function logout() {
            alert("Logged out!");
            window.location.href = "index.html";
        }

        // future me yaha Firebase ya backend connect kar sakte ho
    </script>

</body>
</html>
