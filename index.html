<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
</head>
<body>

<h2>Student Dashboard</h2>

<input type="text" id="student_id" placeholder="Enter Student ID">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>

<h3 id="result"></h3>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://lfcfkmhstqyldzttfpqk.supabase.co/rest/v1/";
  const supabaseKey = "sb_publishable_dJMJ0SpmOXFprT6O9U5w2w_8eCxobTN";

  const supabase = createClient(supabaseUrl, supabaseKey);

  window.login = async function () {
    let id = document.getElementById("student_id").value;
    let pass = document.getElementById("password").value;

    let { data, error } = await supabase
      .from("students")
      .select("*")
      .eq("student_id", id)
      .eq("password", pass);

    if (data.length > 0) {
      document.getElementById("result").innerHTML =
        "Welcome " + data[0].name + "<br>Attendance: " + data[0].attendance;
    } else {
      document.getElementById("result").innerHTML = "Invalid Login ❌";
    }
  };
</script>

</body>
</html>
